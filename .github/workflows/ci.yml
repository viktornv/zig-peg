name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        step:
          - test-main
          - test-json
          - test-http
          - test-graphql
          - test-python-expr

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.1

      - name: Run zig build ${{ matrix.step }}
        run: zig build ${{ matrix.step }}
